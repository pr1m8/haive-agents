[pytest]
minversion = 6.0

# Add the package's source and test directories to the Python path
pythonpath = src tests

# Test discovery settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register custom marks to avoid warnings
markers =
    real_db: Tests that run against a real database
    integration: Integration tests that require external components

# Set asyncio mode and scopes to avoid warnings
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Log configuration
log_cli = True
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Pytest command-line options
addopts = --import-mode=importlib --show-capture=stderr -vv -s

# Use colored terminal output
color = yes

# Test output verbosity (use 1 instead of 2)
verbosity = 1

# Timeout for individual tests (seconds)
timeout = 300

# Cache settings
cache_dir = .pytest_cache